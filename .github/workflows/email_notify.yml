name: Data Notification

on:
  push:
    paths:
      - 'data/fashion_analytics_*.json'
  workflow_run:
    workflows: ["Manual Fashion Analytics Pipeline"]
    types:
      - completed

jobs:
  send-notification:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: data/fashion_analytics_*.json

      - name: Process Data Files and Notify
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="@kleinnconrad - New Fashion Analytics data file(s) created/updated:\n\n"
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            FILENAME=$(basename "$file")
            EXEC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            HAS_DATA="False"
            
            if [ -s "$file" ]; then
               ITEMS=$(jq 'if type=="array" then length elif type=="object" then 1 else 0 end' "$file" 2>/dev/null || echo 0)
               if [ "$ITEMS" -gt 0 ]; then
                 HAS_DATA="True ($ITEMS items)"
               else
                 HAS_DATA="False (0 items or invalid)"
               fi
            else
               HAS_DATA="False (File is empty)"
            fi
            
            BODY="${BODY}- **Filename**: \`$FILENAME\`\n- **Execution Time**: $EXEC_TIME\n- **Contains Data**: $HAS_DATA\n\n"
          done
          
          # Create a commit comment to trigger a GitHub notification (simple mention method)
          COMMIT_SHA=$(git rev-parse HEAD)
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/${COMMIT_SHA}/comments \
            -f body="$(echo -e "$BODY")"
