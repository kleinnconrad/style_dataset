name: Manual Fashion Analytics Pipeline

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC (2:00 AM CET)
  workflow_dispatch:      # Allows manual execution via the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Initialize Crawl4AI
      run: |
        crawl4ai-setup

    - name: Execute Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/main.py

    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: add daily fashion data" && git push)
